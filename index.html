```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>YASHI</title>

<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
    background:#111;
    color:white;
    font-family:'Quicksand',sans-serif;
    margin:0;
    padding:30px 15px 80px;
}

header{
    text-align:center;
    margin-bottom:40px;
}

h1{
    margin:0;
    font-size:48px;
    font-weight:600;
    letter-spacing:2px;
}

.subtitle{
    margin-top:10px;
    opacity:0.8;
    font-size:20px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

@media(min-width:800px){

    .gallery{
        grid-template-columns:repeat(4,1fr);
    }

}

.item{
    cursor:pointer;
}

.item img{
    width:100%;
    aspect-ratio:1/1;
    object-fit:cover;
    display:block;
}

.modal{
    display:none;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.95);

    z-index:999;
}

.modal.active{
    display:flex;
    align-items:center;
    justify-content:center;
}

.modal-content{
    position:relative;
    width:90vw;
    max-width:1000px;
}

.modal img{
    width:100%;
    max-height:90vh;
    object-fit:contain;
}

.caption{
    position:absolute;

    left:20px;
    bottom:20px;

    color:white;

    text-shadow:
    0 0 10px black,
    0 0 20px black;

    max-width:70%;
}

.caption h2{
    margin:0 0 10px;
    font-size:28px;
}

.caption p{
    margin:0;
    line-height:1.6;
}

.close{
    position:absolute;

    top:20px;
    right:20px;

    font-size:40px;

    cursor:pointer;

    color:white;
}

section{
    max-width:800px;
    margin:80px auto 0;
}

section h2{
    font-weight:600;
}

a{
    color:white;
}

</style>
</head>

<body>

<header>

<h1>YASHI</h1>

<div class="subtitle">
Tabla made in Japan
</div>

</header>

<div class="gallery" id="gallery"></div>

<section>

<h2>About</h2>

<p>
Handmade tablas crafted in Japan using domestic wood and traditional materials.
</p>

<h2>Instruments</h2>

<p>
Coming soon.
</p>

<h2>Contact</h2>

<p>
your@email.com
</p>

</section>

<div class="modal" id="modal">

<div class="close" onclick="closeModal()">×</div>

<div class="modal-content">

<img id="modalImage">

<div class="caption">

<h2 id="modalTitle"></h2>

<p id="modalText"></p>

</div>

</div>

</div>

<script>

const items = [

{
image:"images/photo1.jpg",

title:"Japanese Handmade Tabla",

text:"Using Japanese cedar shaped with traditional coopered-shell construction. The wooden body is built from staves rather than being turned from a solid block."
},

{
image:"images/photo2.jpg",

title:"Traditional Japanese Coopering",

text:"The staves are carefully planed to precise angles and assembled into a shell. This method originates from traditional Japanese coopering, a technique historically used for wooden buckets and barrels."
},

{
image:"images/photo3.jpg",

title:"Rattan Hoops",

text:"Rattan hoops are fitted around the shell and tightened to hold the staves together. This technique is also found in traditional Japanese coopered vessels, where hoops provide strength without the use of metal fasteners."
},

{
image:"images/photo4.JPG",

title:"Hinoki Bottom Plate",

text:"The bottom plate is made from Japanese hinoki cypress and secured with glue and wooden pegs. This approach reflects traditional woodworking methods, avoiding screws and other metal hardware."
}

];

items.sort(() => Math.random() - 0.5);

const gallery = document.getElementById("gallery");

items.forEach(item => {

const div = document.createElement("div");

div.className = "item";

div.innerHTML = `
<img src="${item.image}">
`;

div.onclick = () => {

document.getElementById("modalImage").src = item.image;

document.getElementById("modalTitle").innerText = item.title;

document.getElementById("modalText").innerText = item.text;

document.getElementById("modal").classList.add("active");

};

gallery.appendChild(div);

});

function closeModal(){

document.getElementById("modal").classList.remove("active");

}

document.getElementById("modal").onclick = function(e){

if(e.target === this){

closeModal();

}

}

</script>

</body>
</html>
```
